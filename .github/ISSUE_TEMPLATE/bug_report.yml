name: Bug report
description: Something isn't working or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect to happen instead?
      placeholder: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide a minimal command to reproduce. Include `--seed` and the failing test index if available.
      render: bash
      placeholder: |
        dsastress --generator "..." --solution "..." --reference "..." --tests 1000 --seed 123 --minimize --save-dir failing_cases
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste the relevant output. Remove secrets.
      render: text
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 14 ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: dsastress version
      placeholder: Output of `dsastress --version`
    validations:
      required: false

